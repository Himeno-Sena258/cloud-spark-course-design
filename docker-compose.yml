services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: cloud-course-backend:v1
    container_name: cloud-course-backend
    ports:
      - "5000:5000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: cloud-course-frontend:v1
    container_name: cloud-course-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cloud-course-redis
    ports:
      - "6379:6379"
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then
        redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD";
      else
        redis-server --appendonly yes;
      fi'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
