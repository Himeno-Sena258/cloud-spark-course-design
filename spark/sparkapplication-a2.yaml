apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: douban-analysis
  namespace: default
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: swr.cn-north-4.myhuaweicloud.com/cloud-course-cce/pyspark-douban:v2
  imagePullPolicy: Always
  imagePullSecrets:
    - swr-secret
  mainApplicationFile: local:///opt/spark/work/analysis_a2.py
  sparkVersion: "3.4.0"
  restartPolicy:
    type: Never
  driver:
    cores: 1
    coreRequest: "200m"
    memory: "1g"
    memoryOverhead: "256m"
    serviceAccount: spark
  executor:
    cores: 1
    coreRequest: "200m"
    instances: 2
    memory: "1g"
    memoryOverhead: "256m"
